{% extends "base.html" %}
{% block content %}
  <h2>Entrar</h2>
  <form method="post">
    <label>Usuário
      <input type="text" name="username" required>
    </label>
    <label>Senha
      <input type="password" name="password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
  <p>Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a></p>
{% endblock %}
