{% extends "base.html" %}
{% block content %}
  <h2>Criar conta</h2>
  <form method="post">
    <label>Usuário
      <input type="text" name="username" required>
    </label>
    <label>Senha
      <input type="password" name="password" required>
    </label>
    <button type="submit">Cadastrar</button>
  </form>
  <p>Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a></p>
{% endblock %}
